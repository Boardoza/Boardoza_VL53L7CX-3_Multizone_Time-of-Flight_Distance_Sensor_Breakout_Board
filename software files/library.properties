sentence=Library for Boardoza VL53L5CX 8x8 Time-of-Flight Sensor Array with I2C support
paragraph=Comprehensive Arduino library for the STMicroelectronics VL53L5CX advanced time-of-flight sensor featuring an 8x8 imaging array. Enables precise distance measurements up to 4 meters with excellent accuracy, multi-target detection, and ambient light immunity. Supports I2C communication with configurable measurement profiles (ranging modes and integration times), real-time multi-zone obstacle detection, and full integration with Boardoza ecosystem. Perfect for robotics, gesture recognition, proximity sensing, and autonomous navigation applications.
